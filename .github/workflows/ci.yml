name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Build image (M1 build gate)
        run: docker build -t marketing-attribution:ci .

      - name: Smoke run (dry-run, no GCP creds needed)
        run: |
          docker run --rm \
            -e GCP_PROJECT_ID=ci-smoke \
            -e GOOGLE_APPLICATION_CREDENTIALS=/tmp/none \
            -e BQ_START_DATE=2016-08-01 \
            -e BQ_END_DATE=2017-08-01 \
            marketing-attribution:ci --dry-run
